name: Feature Request
description: Suggest a feature for Writ
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the feature
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would you use this feature?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about
