version: 2
updates:
  # Rust workspace
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "quarterly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      cargo-all:
        patterns: ["*"]

  # Root frontend (Tauri / SolidJS / Vite)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "quarterly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-all:
        patterns: ["*"]

  # Site (Astro)
  - package-ecosystem: "npm"
    directory: "/site"
    target-branch: "dev"
    schedule:
      interval: "quarterly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "site"
    commit-message:
      prefix: "chore(deps)(site)"
      include: "scope"
    groups:
      site-all:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "quarterly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      gha-all:
        patterns: ["*"]
