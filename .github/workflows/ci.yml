name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            cross_only: false
          - os: macos-latest
            label: macOS
            cross_only: true
          - os: windows-latest
            label: Windows
            cross_only: true

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    # Skip the expensive macOS (10x) and Windows (2x) jobs on dependabot PRs.
    # Linux gates dependency bumps; cross-OS proves real changes on push to main
    # and on human-authored PRs.
    if: |
      matrix.cross_only == false
      || github.event_name == 'push'
      || github.event.pull_request.user.login != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
        continue-on-error: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Security audit
        run: cargo audit
        continue-on-error: true

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Frontend build
        run: pnpm build

      - name: Tauri build check
        run: cargo check --lib -p writ-tauri
