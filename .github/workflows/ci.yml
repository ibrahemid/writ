name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            cross_only: false
          - os: macos-latest
            label: macOS
            cross_only: true
          - os: windows-latest
            label: Windows
            cross_only: true

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
        continue-on-error: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --check

      # Compiling writ-tauri (clippy, tests, check) runs the Tauri build
      # script, which requires the CLI sidecar to exist for the host triple.
      - name: Build CLI sidecar
        shell: bash
        run: |
          set -euo pipefail
          HOST_TRIPLE="$(rustc -vV | sed -n 's/host: //p')"
          cargo build -p writ-cli
          mkdir -p src-tauri/binaries
          EXT=""
          case "$HOST_TRIPLE" in *windows*) EXT=".exe";; esac
          cp "target/debug/writ${EXT}" "src-tauri/binaries/writ-${HOST_TRIPLE}${EXT}"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Security audit
        run: cargo audit
        continue-on-error: true

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Frontend build
        run: pnpm build

      - name: Tauri build check
        run: cargo check --lib -p writ-tauri
