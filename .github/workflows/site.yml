name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Sync latest release data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        working-directory: site
        run: |
          set -e
          echo "Fetching latest release for $REPO..."
          RELEASE_JSON="$(gh api "repos/$REPO/releases/latest" 2>/dev/null || echo '')"

          if [ -z "$RELEASE_JSON" ] || [ "$(echo "$RELEASE_JSON" | jq -r '.message // empty')" = "Not Found" ]; then
            echo "No published release found yet. Keeping committed release.json."
            exit 0
          fi

          TAG="$(echo "$RELEASE_JSON" | jq -r '.tag_name // ""')"
          VERSION="${TAG#v}"
          PUBLISHED_AT="$(echo "$RELEASE_JSON" | jq -r '.published_at // ""')"

          MAC_ARM64="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("aarch64.*\\.dmg$|arm64.*\\.dmg$"))] | .[0].browser_download_url // ""')"
          MAC_X64="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("x64.*\\.dmg$|x86_64.*\\.dmg$"))] | .[0].browser_download_url // ""')"
          WIN_X64="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("\\.msi$"))] | .[0].browser_download_url // ""')"
          LINUX_APPIMAGE="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("\\.AppImage$"))] | .[0].browser_download_url // ""')"
          LINUX_DEB="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("\\.deb$"))] | .[0].browser_download_url // ""')"

          jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg publishedAt "$PUBLISHED_AT" \
            --arg macArm "$MAC_ARM64" \
            --arg macX "$MAC_X64" \
            --arg winX "$WIN_X64" \
            --arg appImage "$LINUX_APPIMAGE" \
            --arg deb "$LINUX_DEB" \
            '{
              version: $version,
              tag: $tag,
              publishedAt: $publishedAt,
              assets: {
                "mac-arm64": (if $macArm == "" then "#" else $macArm end),
                "mac-x64": (if $macX == "" then "#" else $macX end),
                "win-x64": (if $winX == "" then "#" else $winX end),
                "linux-appimage": (if $appImage == "" then "#" else $appImage end),
                "linux-deb": (if $deb == "" then "#" else $deb end)
              }
            }' > src/data/release.json

          echo "Wrote release.json:"
          cat src/data/release.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build Astro site
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
