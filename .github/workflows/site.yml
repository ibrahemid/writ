name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Sync latest release data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        working-directory: site
        run: |
          set -e
          echo "Fetching latest release for $REPO..."
          RELEASE_JSON="$(gh api "repos/$REPO/releases/latest" 2>/dev/null || echo '')"

          if [ -z "$RELEASE_JSON" ] || [ "$(echo "$RELEASE_JSON" | jq -r '.message // empty')" = "Not Found" ]; then
            echo "No published release found yet. Keeping committed release.json."
            exit 0
          fi

          TAG="$(echo "$RELEASE_JSON" | jq -r '.tag_name // ""')"
          VERSION="${TAG#v}"
          PUBLISHED_AT="$(echo "$RELEASE_JSON" | jq -r '.published_at // ""')"

          # checksums: SHA256SUMS.txt has "<sha>  <filename>" lines
          SUMS_URL="$(echo "$RELEASE_JSON" | jq -r '[.assets[]|select(.name=="SHA256SUMS.txt")]|.[0].browser_download_url // ""')"
          SUMS=""; [ -n "$SUMS_URL" ] && SUMS="$(curl -fsSL "$SUMS_URL" || echo '')"
          sha_for(){ echo "$SUMS" | awk -v f="$1" '$2==f{print $1}' | head -1; }
          url_for(){ echo "$RELEASE_JSON" | jq -r --arg re "$1" '[.assets[]|select(.name|test($re))]|.[0].browser_download_url // ""'; }
          name_for(){ echo "$RELEASE_JSON" | jq -r --arg re "$1" '[.assets[]|select(.name|test($re))]|.[0].name // ""'; }
          DMG=$(url_for 'universal\.dmg$'); PKG=$(url_for 'universal\.pkg$')
          MSI=$(url_for '\.msi$'); DEB=$(url_for '\.deb$'); APP=$(url_for '\.AppImage$')
          NOTARIZED="${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' }}"
          PUBLISHED=false; [ -n "$DMG$MSI$DEB" ] && PUBLISHED=true
          jq -n --arg version "$VERSION" --arg tag "$TAG" --arg publishedAt "$PUBLISHED_AT" \
            --argjson published "$PUBLISHED" --argjson notarized "$NOTARIZED" \
            --arg dmg "$DMG" --arg pkg "$PKG" --arg msi "$MSI" --arg deb "$DEB" --arg app "$APP" \
            --arg sdmg "$(sha_for "$(name_for 'universal\.dmg$')")" \
            --arg spkg "$(sha_for "$(name_for 'universal\.pkg$')")" \
            --arg smsi "$(sha_for "$(name_for '\.msi$')")" \
            --arg sdeb "$(sha_for "$(name_for '\.deb$')")" \
            --arg sapp "$(sha_for "$(name_for '\.AppImage$')")" \
            '{version:$version,tag:$tag,publishedAt:$publishedAt,published:$published,notarized:$notarized,
              platforms:{
                mac:{dmg:(if $dmg==""then"#"else $dmg end),pkg:(if $pkg==""then"#"else $pkg end),sha256_dmg:$sdmg,sha256_pkg:$spkg},
                win:{msi:(if $msi==""then"#"else $msi end),sha256_msi:$smsi},
                linux:{deb:(if $deb==""then"#"else $deb end),appImage:(if $app==""then"#"else $app end),sha256_deb:$sdeb,sha256_appImage:$sapp}
              }}' > src/data/release.json

          echo "Wrote release.json:"
          cat src/data/release.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build Astro site
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
