<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Writ, a scratchpad text editor for developers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f5"/>
      <stop offset="1" stop-color="#f1ece5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#c0680a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#c0680a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#a1400a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(88 108)">
    <rect width="88" height="88" rx="20" fill="url(#markBg)"/>
    <g transform="translate(20 18)" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M6 50h36"/>
      <path d="M12 40 30 10l10 10L22 50z"/>
    </g>
  </g>

  <g font-family="Inter, -apple-system, system-ui, sans-serif" fill="#1d1a16">
    <text x="88" y="296" font-size="104" font-weight="700" letter-spacing="-3.5">Writ</text>
    <text x="88" y="370" font-size="38" font-weight="500">A scratchpad that's always</text>
    <text x="88" y="414" font-size="38" font-weight="500">
      <tspan fill="#c0680a">one keypress</tspan>
      <tspan> away.</tspan>
    </text>
  </g>

  <g transform="translate(88 510)" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="20">
    <rect x="0" y="-32" width="42" height="44" rx="10" fill="#ffffff" stroke="rgba(29,26,22,0.16)"/>
    <text x="12" y="-2" fill="#1d1a16" font-weight="600">⌘</text>
    <rect x="52" y="-32" width="42" height="44" rx="10" fill="#ffffff" stroke="rgba(29,26,22,0.16)"/>
    <text x="64" y="-2" fill="#1d1a16" font-weight="600">⇧</text>
    <rect x="104" y="-32" width="96" height="44" rx="10" fill="#ffffff" stroke="rgba(29,26,22,0.16)"/>
    <text x="120" y="-2" fill="#1d1a16" font-weight="600">Space</text>
    <text x="220" y="-2" fill="#75685a">summon from anywhere</text>
  </g>

  <g transform="translate(720 100)">
    <rect width="394" height="430" rx="18" fill="#ffffff" stroke="rgba(29,26,22,0.1)"/>
    <rect width="394" height="36" fill="#fdfbf7"/>
    <circle cx="18" cy="18" r="5" fill="#ef4444"/>
    <circle cx="38" cy="18" r="5" fill="#f59e0b"/>
    <circle cx="58" cy="18" r="5" fill="#22c55e"/>
    <text x="100" y="23" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1d1a16" font-weight="500">scratch.ts</text>
    <text x="182" y="23" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#85776a">todo.md</text>
    <text x="240" y="23" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#85776a">release.md</text>

    <g font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="14" transform="translate(24 70)">
      <text x="0" y="0" fill="#9a8b7a">1</text>
      <text x="26" y="0" fill="#9a8b7a" font-style="italic">// scratchpad — always a keypress away</text>

      <text x="0" y="28" fill="#9a8b7a">2</text>
      <text x="26" y="28" fill="#a1400a">const</text>
      <text x="72" y="28" fill="#c0680a">writ</text>
      <text x="110" y="28" fill="#1d1a16"> = </text>
      <text x="134" y="28" fill="#a1400a">new</text>
      <text x="172" y="28" fill="#a1400a" font-weight="500">Scratchpad</text>
      <text x="272" y="28" fill="#85776a">({</text>

      <text x="0" y="56" fill="#9a8b7a">3</text>
      <text x="26" y="56" fill="#c0680a">  hotkey</text>
      <text x="100" y="56" fill="#1d1a16">: </text>
      <text x="116" y="56" fill="#0f766e">'Cmd+Shift+Space'</text>

      <text x="0" y="84" fill="#9a8b7a">4</text>
      <text x="26" y="84" fill="#c0680a">  autosave</text>
      <text x="120" y="84" fill="#1d1a16">: </text>
      <text x="136" y="84" fill="#a1400a">true</text>

      <text x="0" y="112" fill="#9a8b7a">5</text>
      <text x="26" y="112" fill="#c0680a">  storage</text>
      <text x="112" y="112" fill="#1d1a16">: </text>
      <text x="128" y="112" fill="#0f766e">'local'</text>

      <text x="0" y="140" fill="#9a8b7a">6</text>
      <text x="26" y="140" fill="#85776a">})</text>
    </g>

    <rect x="0" y="390" width="394" height="40" fill="#faf8f5"/>
    <circle cx="22" cy="410" r="5" fill="#0f766e"/>
    <text x="36" y="415" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#75685a">autosaved · local only</text>
  </g>

  <text x="1112" y="608" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#75685a" text-anchor="end" font-weight="500">ibrahemid.github.io/writ</text>
</svg>
